<!doctype html>
<html lang="en">
  <head>
    <title>Demo Restaurant</title>
    <meta property="og:image" content="/assets/hero-dining-room.jpg">
    <link rel="icon" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600" rel="stylesheet">
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Demo Restaurant",
        "logo": "https://demo.example/assets/logo-gold.png"
      }
    </script>
    <style>
      :root {
        --ink: #17120e;
        --paper: #f6efe3;
        --accent: #b9802f;
        --muted: rgb(124, 107, 91);
        font-family: "Inter", sans-serif;
      }
      h1 { font-family: "Playfair Display", serif; color: var(--ink); }
    </style>
  </head>
  <body>
    <header>
      <img class="site-logo" src="/assets/logo-gold.png" alt="Demo Restaurant logo">
    </header>
    <main>
      <img class="hero restaurant-interior" src="/assets/hero-dining-room.jpg" alt="Dining room">
      <img class="dish gallery" src="/assets/signature-dish.jpg" alt="Signature dish">
      <img class="instagram-avatar" src="/assets/avatar.jpg" alt="">
    </main>
  </body>
</html>
