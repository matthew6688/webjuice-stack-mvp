    <path d="M112 680 H873 V1000 H112 Z" fill="#f2eee6"/>
    <path d="M1020 690 H1490 V1000 H1020 Z" fill="#ebe7dd"/>
    <g fill="#142335">
      <rect x="205" y="740" width="120" height="190"/>
      <rect x="380" y="740" width="120" height="190"/>
      <rect x="1110" y="745" width="106" height="170"/>
      <rect x="1270" y="745" width="106" height="170"/>
    </g>
    <g stroke="#5e6a78" stroke-width="7" opacity=".55">
