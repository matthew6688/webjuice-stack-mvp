<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Premium home roofline at dusk">
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07182b"/>
      <stop offset=".52" stop-color="#123356"/>
      <stop offset="1" stop-color="#0a1422"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" x2="1">
      <stop offset="0" stop-color="#0b1725"/>
      <stop offset=".55" stop-color="#253447"/>
      <stop offset="1" stop-color="#0c1520"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency=".75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .16"/></feComponentTransfer>
      <feBlend mode="overlay" in2="SourceGraphic"/>
    </filter>
    <radialGradient id="warm" cx=".72" cy=".36" r=".44">
      <stop offset="0" stop-color="#e3a765" stop-opacity=".45"/>
      <stop offset=".62" stop-color="#e3a765" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#sky)"/>
  <rect width="1600" height="1000" fill="url(#warm)"/>
  <g filter="url(#grain)">
    <path d="M0 650 L470 315 L960 650 Z" fill="url(#roof)"/>
    <path d="M445 318 L1600 595 L1600 1000 L915 1000 L960 650 Z" fill="#0c1623"/>
    <path d="M0 650 L960 650 L905 730 L0 730 Z" fill="#1f2c3b"/>
