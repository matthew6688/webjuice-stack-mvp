<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Roofing crew on a clean modern roof</title>
  <desc id="desc">Original stylized roofing photograph placeholder with a contractor silhouette, roof planes, and soft sky.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="oklch(94% 0.012 230)"/>
      <stop offset="1" stop-color="oklch(80% 0.02 245)"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="oklch(47% 0.018 240)"/>
      <stop offset="1" stop-color="oklch(22% 0.02 245)"/>
    </linearGradient>
    <filter id="grain">
