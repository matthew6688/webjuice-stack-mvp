name: SOP-0 Regression

on:
  push:
    branches: [main]
    paths:
      - 'core/tasks/**'
      - 'core/leads/discovery-store.js'
      - 'core/funnel/pipeline-batch-thread.js'
      - 'scripts/cli/pl-task-*.js'
      - 'scripts/cli/pl-pipeline-batch-*.js'
      - 'scripts/cli/pl-places-search-intake.js'
      - 'scripts/cli/pl-single-enrich.js'
      - 'scripts/cli/pl-dedup-audit.js'
      - 'scripts/qa/test-sop0-regression.mjs'
      - 'scripts/qa/test-task-store.mjs'
  pull_request:
    branches: [main]
    paths:
      - 'core/tasks/**'
      - 'core/leads/discovery-store.js'
      - 'core/funnel/pipeline-batch-thread.js'
      - 'scripts/cli/pl-*.js'
      - 'scripts/qa/test-sop0-*.mjs'
      - 'scripts/qa/test-task-store.mjs'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: SOP-0 task-store smoke (29 assertions)
        run: npm run qa:test-task-store
      - name: SOP-0 regression suite (T1-T5, T13, T15, T20, T21 · 16 assertions)
        # T15 expects ollama unreachable in CI (which is correct — GH runners
        # don't have ollama). Test handles both cases gracefully (regex OR
        # cached ollama URL).
        run: npm run qa:test-sop0-regression
