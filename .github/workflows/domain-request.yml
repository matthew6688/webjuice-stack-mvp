name: Domain Request

on:
  workflow_dispatch:
    inputs:
      client_slug:
        description: Client slug.
        required: true
        type: string
      order_id:
        description: Optional order ID.
        required: false
        type: string
      email:
        description: Optional checkout email.
        required: false
        type: string
      domain:
        description: Requested domain/subdomain. Blank defaults to <client>.profitslocal.com.
        required: false
        type: string
      project:
        description: Cloudflare Pages live project. Defaults to <client>-live.
        required: false
        type: string
      execute:
        description: Execute DNS/Pages changes when allowed.
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      allow_root:
        description: Allow root-domain auto attach after DNS audit.
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      send_email:
        description: Send customer domain status email.
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  domain:
    runs-on: ubuntu-latest
    concurrency:
      group: domain-request-${{ inputs.client_slug }}-${{ inputs.domain || inputs.order_id || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Refresh main
        run: git pull --ff-only origin main

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Handle domain request
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN || secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.PROFITSLOCAL_CF_ZONE_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          WEBSITE_TASKS_DISCORD_BOT_TOKEN: ${{ secrets.WEBSITE_TASKS_DISCORD_BOT_TOKEN || secrets.DISCORD_BOT_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL || 'ProfitsLocal <hi@profitslocal.com>' }}
          RESEND_EMAIL_UNIT_COST: ${{ vars.RESEND_EMAIL_UNIT_COST }}
        run: |
          npm run domain:request -- \
            --client "${{ inputs.client_slug }}" \
            --order "${{ inputs.order_id }}" \
            --email "${{ inputs.email }}" \
            --domain "${{ inputs.domain }}" \
            --project "${{ inputs.project }}" \
            --execute "${{ inputs.execute }}" \
            --allowRoot "${{ inputs.allow_root }}" \
            --send-email "${{ inputs.send_email }}"

      - name: Commit domain state
        run: |
          git config user.name "webjuice-agent"
          git config user.email "webjuice-agent@users.noreply.github.com"
          git add data/domain/requests data/domain/*.json || true
          git add data/cases || true
          git add -f data/finance/ledger.jsonl || true
          if git diff --cached --quiet; then
            echo "No domain state to commit."
          else
            git commit -m "chore: update domain request state"
            git push
          fi
