name: Route Funnel Event

on:
  workflow_dispatch:
    inputs:
      provider:
        description: Payload provider. Use auto unless the caller knows the source.
        required: true
        default: auto
        type: choice
        options:
          - auto
          - stripe
          - tally
      payload:
        description: Raw webhook payload JSON.
        required: true
        type: string
      send_discord:
        description: Send Discord notifications.
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      send_email:
        description: Send customer emails through Resend.
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: Route without writing generated state or sending notifications.
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      auto_run_agent:
        description: After routing, run the generated task against the client dev repo.
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write payload file
        env:
          FUNNEL_EVENT_PAYLOAD: ${{ inputs.payload }}
        run: |
          node -e "const fs=require('fs'); JSON.parse(process.env.FUNNEL_EVENT_PAYLOAD); fs.writeFileSync('/tmp/funnel-event.json', process.env.FUNNEL_EVENT_PAYLOAD);"

      - name: Route funnel event
        env:
          SALES_DISCORD_WEBHOOK_URL: ${{ secrets.SALES_DISCORD_WEBHOOK_URL }}
          REVISE_DISCORD_WEBHOOK_URL: ${{ secrets.REVISE_DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL || 'ProfitsLocal <hello@fengtalk.ai>' }}
          EXTRA_REVISION_CHECKOUT_URL: ${{ vars.EXTRA_REVISION_CHECKOUT_URL }}
        run: |
          npm run funnel:route-event -- \
            --input /tmp/funnel-event.json \
            --provider "${{ inputs.provider }}" \
            --send-discord "${{ inputs.send_discord }}" \
            --send-email "${{ inputs.send_email }}" \
            --dry-run "${{ inputs.dry_run }}" \
            --output /tmp/funnel-route-summary.json

      - name: Clone client repo for generated task
        if: ${{ inputs.dry_run != 'true' && inputs.auto_run_agent == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const s = JSON.parse(fs.readFileSync('/tmp/funnel-route-summary.json', 'utf8'));
          const run = Boolean(s.ok && s.taskPath && s.repo);
          fs.writeFileSync('/tmp/run-agent.env', [
            `RUN_AGENT=${run ? 'true' : 'false'}`,
            `CLIENT_REPO=${s.repo || ''}`,
            `TASK_PATH=${s.taskPath || ''}`,
            `CLIENT_SLUG=${s.clientSlug || ''}`,
            '',
          ].join('\n'));
          NODE
          cat /tmp/run-agent.env >> "$GITHUB_ENV"
          . /tmp/run-agent.env
          if [ "$RUN_AGENT" != "true" ]; then
            echo "No generated runnable task; skipping agent run."
            exit 0
          fi
          gh auth setup-git
          gh repo clone "$CLIENT_REPO" /tmp/client-repo
          git -C /tmp/client-repo config user.name "webjuice-agent"
          git -C /tmp/client-repo config user.email "webjuice-agent@users.noreply.github.com"
          npm ci --prefix /tmp/client-repo

      - name: Run generated agent task
        if: ${{ inputs.dry_run != 'true' && inputs.auto_run_agent == 'true' && env.RUN_AGENT == 'true' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SALES_DISCORD_WEBHOOK_URL: ${{ secrets.SALES_DISCORD_WEBHOOK_URL }}
          REVISE_DISCORD_WEBHOOK_URL: ${{ secrets.REVISE_DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL || 'ProfitsLocal <hello@fengtalk.ai>' }}
          EXTRA_REVISION_CHECKOUT_URL: ${{ vars.EXTRA_REVISION_CHECKOUT_URL }}
        run: |
          npm run agent:complete-task -- \
            --task "$TASK_PATH" \
            --repo-dir /tmp/client-repo \
            --repo-root "$GITHUB_WORKSPACE" \
            --execute true \
            --checkout true \
            --push true \
            --check-deploy true \
            --send-email "${{ inputs.send_email }}" \
            --send-discord "${{ inputs.send_discord }}" \
            --output /tmp/agent-complete-result.json

      - name: Commit generated funnel state
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "webjuice-agent"
          git config user.email "webjuice-agent@users.noreply.github.com"
          git add data/funnel data/agent-tasks data/cases || true
          git add -f data/finance/ledger.jsonl || true
          if git diff --cached --quiet; then
            echo "No generated funnel state to commit."
          else
            git commit -m "chore: route funnel event"
            git push
          fi
