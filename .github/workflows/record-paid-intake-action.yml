name: Record Paid Intake Action

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Structured paid intake admin action JSON.
        required: true
        type: string
      dedupe_key:
        description: Stable idempotency key for this admin action.
        required: false
        type: string

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    concurrency:
      group: record-paid-intake-action-${{ inputs.dedupe_key || github.run_id }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Refresh main
        run: git pull --ff-only origin main

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Write payload
        env:
          PAID_INTAKE_ACTION_PAYLOAD: ${{ inputs.payload }}
        run: |
          node -e "const fs=require('fs'); JSON.parse(process.env.PAID_INTAKE_ACTION_PAYLOAD); fs.writeFileSync('/tmp/paid-intake-action.json', process.env.PAID_INTAKE_ACTION_PAYLOAD);"

      - name: Record paid intake admin action
        run: npm run funnel:record-paid-intake-action -- --input /tmp/paid-intake-action.json --output /tmp/paid-intake-action-summary.json

      - name: Commit paid intake action state
        run: |
          git config user.name "webjuice-agent"
          git config user.email "webjuice-agent@users.noreply.github.com"
          git add data/paid-intakes data/cases clients || true
          if git diff --cached --quiet; then
            echo "No paid intake action state to commit."
          else
            git commit -m "chore: record paid intake action"
            git push
          fi
