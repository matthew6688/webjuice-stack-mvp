name: Record Paid Revision

on:
  workflow_dispatch:
    inputs:
      payload:
        description: Structured paid revision JSON.
        required: true
        type: string
      dedupe_key:
        description: Stable idempotency key for this revision submission.
        required: false
        type: string

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    concurrency:
      group: record-paid-revision-${{ inputs.dedupe_key || github.run_id }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Refresh main
        run: git pull --ff-only origin main

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Write payload
        env:
          PAID_REVISION_PAYLOAD: ${{ inputs.payload }}
        run: |
          node -e "const fs=require('fs'); JSON.parse(process.env.PAID_REVISION_PAYLOAD); fs.writeFileSync('/tmp/paid-revision.json', process.env.PAID_REVISION_PAYLOAD);"

      - name: Record paid revision
        run: npm run funnel:record-paid-revision -- --input /tmp/paid-revision.json --output /tmp/paid-revision-summary.json

      - name: Commit paid revision state
        run: |
          git config user.name "webjuice-agent"
          git config user.email "webjuice-agent@users.noreply.github.com"
          git add data/paid-intakes || true
          if git diff --cached --quiet; then
            echo "No paid revision state to commit."
          else
            git commit -m "chore: record paid revision"
            git push
          fi
