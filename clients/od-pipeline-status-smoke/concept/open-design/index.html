<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pipeline status smoke</title>
  <style>
    :root {
      --bg: oklch(97% 0.012 80);
      --surface: oklch(99% 0.005 80);
      --fg: oklch(20% 0.02 60);
      --muted: oklch(48% 0.015 60);
      --border: oklch(89% 0.012 80);
      --accent: oklch(58% 0.16 35);

      --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .section {
      width: min(100%, 920px);
      padding: 48px 28px;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(44px, 8vw, 84px);
      line-height: 1.02;
      letter-spacing: -0.02em;
      text-wrap: balance;
    }
  </style>
</head>
<body>
  <main>
    <section class="section" data-od-id="pipeline-status">
      <p class="eyebrow">Status</p>
      <h1>Pipeline status smoke</h1>
    </section>
  </main>
</body>
</html>
