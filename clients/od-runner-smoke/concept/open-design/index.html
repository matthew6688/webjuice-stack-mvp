<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProfitsLocal Open Design runner ok</title>
  <style>
    :root {
      --bg: oklch(97% 0.012 80);
      --surface: oklch(99% 0.005 80);
      --fg: oklch(20% 0.02 60);
      --muted: oklch(48% 0.015 60);
      --border: oklch(89% 0.012 80);
      --accent: oklch(58% 0.16 35);
      --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: min(680px, calc(100vw - 48px));
      padding: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(36px, 7vw, 68px);
      line-height: 1.02;
      text-wrap: balance;
    }
  </style>
</head>
<body>
  <main aria-label="Smoke test status">
    <p>Smoke test</p>
    <h1>ProfitsLocal Open Design runner ok</h1>
  </main>
</body>
</html>
