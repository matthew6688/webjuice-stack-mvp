<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mac App Visible Smoke</title>
  <style>
    :root {
      --bg: oklch(99% 0.002 240);
      --surface: oklch(100% 0 0);
      --fg: oklch(18% 0.012 250);
      --muted: oklch(54% 0.012 250);
      --border: oklch(92% 0.005 250);
      --accent: oklch(58% 0.18 255);

      --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: ui-monospace, 'SF Mono', Menlo, monospace;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px),
        var(--bg);
      background-size: 48px 48px;
      color: var(--fg);
      font-family: var(--font-body);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .section {
      width: min(920px, calc(100vw - 48px));
      min-height: 320px;
      display: grid;
      place-items: center;
      padding: clamp(32px, 6vw, 72px);
      background: color-mix(in oklch, var(--surface) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 24px 70px color-mix(in oklch, var(--fg) 10%, transparent);
    }

    main {
      display: grid;
      gap: 20px;
      width: min(920px, 100%);
    }

    .container {
      width: 100%;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--fg);
      font-family: var(--font-display);
      font-size: clamp(48px, 8vw, 96px);
      font-weight: 600;
      line-height: 0.98;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .meta {
      margin: 28px 0 0;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <main>
    <section class="section" data-od-id="mac-app-visible-smoke">
      <div class="container">
        <p class="eyebrow">Visibility smoke</p>
        <h1>Mac App Visible Smoke</h1>
        <p class="meta">index.html - ready</p>
      </div>
    </section>
    <section class="section" data-od-id="open-design-discord-update-smoke">
      <div class="container">
        <p class="eyebrow">Discord update</p>
        <h1>Open Design Discord Update Smoke</h1>
        <p class="meta">visible section - smoke update</p>
      </div>
    </section>
  </main>
</body>
</html>
